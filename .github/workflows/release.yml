name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: intl, zip

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/stagehand/go.mod
          cache-dependency-path: runtime/stagehand/go.sum

      - name: Install PHP dependencies
        working-directory: packages/laravel
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP tests
        working-directory: packages/laravel
        run: composer test

      - name: Run Go tests
        working-directory: runtime/stagehand
        run: go test ./... -timeout 120s

  build-binaries:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/stagehand/go.mod
          cache-dependency-path: runtime/stagehand/go.sum

      - name: Build stagehand binary
        working-directory: runtime/stagehand
        run: |
          mkdir -p dist
          ASSET="stagehand_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w -X github.com/oxhq/canio/runtime/stagehand/internal/version.Value=${GITHUB_REF_NAME}" \
            -o "dist/${ASSET}" ./cmd/stagehand
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: runtime/stagehand/dist/${{ env.ASSET }}

  checksums:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: stagehand_*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum stagehand_* > checksums.txt

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.txt

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-binaries
      - checksums
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten release payload
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*

  publish-stagehand-image:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Stagehand image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/stagehand.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/canio-stagehand:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/canio-stagehand:latest
