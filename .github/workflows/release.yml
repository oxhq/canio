name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release surfaces
        run: ./scripts/check-release-surface.sh "${GITHUB_REF_NAME}"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: intl, zip

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/stagehand/go.mod
          cache-dependency-path: runtime/stagehand/go.sum

      - name: Install PHP dependencies
        working-directory: packages/laravel
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP tests
        working-directory: packages/laravel
        run: composer test

      - name: Run Go tests
        working-directory: runtime/stagehand
        run: go test ./... -timeout 120s

  build-binaries:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
          - goos: linux
            goarch: arm64
            ext: ""
          - goos: darwin
            goarch: amd64
            ext: ""
          - goos: darwin
            goarch: arm64
            ext: ""
          - goos: windows
            goarch: amd64
            ext: ".exe"
          - goos: windows
            goarch: arm64
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/stagehand/go.mod
          cache-dependency-path: runtime/stagehand/go.sum

      - name: Build stagehand binary
        working-directory: runtime/stagehand
        run: |
          mkdir -p dist
          ASSET="stagehand_${GITHUB_REF_NAME}_${{ matrix.goos }}_${{ matrix.goarch }}${{ matrix.ext }}"
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -trimpath -ldflags="-s -w -X github.com/oxhq/canio/runtime/stagehand/internal/version.Value=${GITHUB_REF_NAME}" \
            -o "dist/${ASSET}" ./cmd/stagehand
          echo "ASSET=${ASSET}" >> "$GITHUB_ENV"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET }}
          path: runtime/stagehand/dist/${{ env.ASSET }}

  launch-smoke:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: intl, zip

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/stagehand/go.mod
          cache-dependency-path: runtime/stagehand/go.sum

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Download release binary artifact
        uses: actions/download-artifact@v4
        with:
          pattern: stagehand_${{ github.ref_name }}_*
          merge-multiple: true
          path: dist

      - name: Locate release binary
        run: echo "CANIO_RELEASE_SMOKE_BINARY=$(find dist -type f -name 'stagehand_${{ github.ref_name }}_linux_amd64' -print -quit)" >> "$GITHUB_ENV"

      - name: Run launch smoke
        env:
          CANIO_CHROMIUM_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          CANIO_CHROMIUM_NO_SANDBOX: "true"
          CANIO_PACKAGE_SOURCE_MODE: vcs
          CANIO_PACKAGE_CONSTRAINT: ${{ github.ref_name }}
          CANIO_RUNTIME_RELEASE_VERSION: ${{ github.ref_name }}
        run: ./scripts/smoke-launch.sh

  checksums:
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: stagehand_*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        run: |
          cd dist
          sha256sum stagehand_* > checksums.txt

      - name: Upload checksum artifact
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: dist/checksums.txt

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - build-binaries
      - launch-smoke
      - checksums
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download stagehand artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: stagehand_${{ github.ref_name }}_*
          merge-multiple: true
          path: dist/stagehand

      - name: Download checksum artifact
        uses: actions/download-artifact@v4
        with:
          name: checksums
          path: dist/checksums

      - name: Flatten release payload
        run: |
          mkdir -p release
          find dist -type f -exec cp {} release/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: docs/releases/${{ github.ref_name }}.md
          fail_on_unmatched_files: true
          files: release/*

  publish-stagehand-image:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Stagehand image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/stagehand.Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/canio-stagehand:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/canio-stagehand:latest

  verify-distribution:
    runs-on: ubuntu-latest
    needs:
      - publish-release
      - publish-stagehand-image
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: intl, zip

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/stagehand/go.mod
          cache-dependency-path: runtime/stagehand/go.sum

      - name: Setup Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Verify release distribution
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CANIO_CHROMIUM_PATH: ${{ steps.setup-chrome.outputs.chrome-path }}
          CANIO_CHROMIUM_NO_SANDBOX: "true"
        run: ./scripts/verify-release-distribution.sh "${GITHUB_REF_NAME}"
