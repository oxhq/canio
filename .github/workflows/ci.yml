name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  release-surface:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate release surfaces
        run: ./scripts/check-release-surface.sh

  php-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.4"
    defaults:
      run:
        working-directory: packages/laravel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          extensions: intl, zip

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run package tests
        run: composer test

  go-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: runtime/stagehand
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/stagehand/go.mod
          cache-dependency-path: runtime/stagehand/go.sum

      - name: Run runtime tests
        run: go test ./... -timeout 120s

      - name: Build stagehand
        run: go build ./cmd/stagehand

  docker-stagehand:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Stagehand image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/stagehand.Dockerfile
          push: false

  launch-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none
          extensions: intl, zip

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: runtime/stagehand/go.mod
          cache-dependency-path: runtime/stagehand/go.sum

      - name: Run launch smoke
        env:
          CANIO_PACKAGE_SOURCE_MODE: vcs
          CANIO_RUNTIME_RELEASE_VERSION: v1.0.0
        run: ./scripts/smoke-launch.sh
